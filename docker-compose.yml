services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: voidpay
      POSTGRES_PASSWORD: voidpay
      POSTGRES_DB: voidpay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  monerod:
    image: sethsimmons/simple-monerod:latest
    command: >
      --stagenet
      --rpc-bind-ip=0.0.0.0
      --rpc-bind-port=18081
      --confirm-external-bind
      --no-igd
      --fixed-difficulty=1
    ports:
      - "18081:18081"
    volumes:
      - monero_data:/home/monero/.bitmonero

  monero-wallet-rpc:
    image: sethsimmons/simple-monero-wallet-rpc:latest
    command: >
      --stagenet
      --daemon-address=monerod:18081
      --rpc-bind-port=18082
      --rpc-bind-ip=0.0.0.0
      --confirm-external-bind
      --wallet-dir=/wallet
      --disable-rpc-login
    ports:
      - "18082:18082"
    volumes:
      - monero_wallet:/wallet
    depends_on:
      - monerod

volumes:
  postgres_data:
  monero_data:
  monero_wallet:
